// ── UTILS ──────────────────────────────────────────────────
const yen=n=>"¥"+Math.round(n||0).toLocaleString("ja-JP");
const toDay=()=>new Date().toISOString().slice(0,10);
const daysUntil=d=>{if(!d)return 999;return Math.ceil((new Date(d)-new Date(new Date().toDateString()))/86400000);};
const totalPrice=j=>(j.basePrice||0)+(j.addOns||[]).reduce((s,a)=>s+(Number(a.amount)||0),0);
const hrRate=(price,hours)=>hours>0?Math.round(price/hours):0;
const thisMonth=()=>{const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;};
const thisYear=()=>String(new Date().getFullYear());
const uid=()=>localStorage.getItem("fk_uid")||(()=>{const id="user_"+Math.random().toString(36).slice(2);localStorage.setItem("fk_uid",id);return id;})();

// ── SUPABASE SYNC ──────────────────────────────────────────
async function dbLoad(table,userId){
  const{data,error}=await sb.from(table).select("data").eq("user_id",userId).single();
  if(error||!data)return null;
  return data.data;
}
async function dbSave(table,userId,payload){
  const{data:existing}=await sb.from(table).select("id").eq("user_id",userId).single();
  if(existing){
    await sb.from(table).update({data:payload,updated_at:new Date().toISOString()}).eq("user_id",userId);
  }else{
    await sb.from(table).insert({user_id:userId,data:payload});
  }
}

// ── UI PRIMITIVES ──────────────────────────────────────────
function Tooltip({text,children}){
  const[show,setShow]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    function h(e){if(ref.current&&!ref.current.contains(e.target))setShow(false);}
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  return(
    <span ref={ref} style={{position:"relative",display:"inline-flex",alignItems:"center"}}>
      {children}
      <span onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)} onClick={()=>setShow(s=>!s)}
        style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:16,height:16,borderRadius:"50%",background:"#F1F5F9",color:"#64748B",fontSize:10,cursor:"help",marginLeft:4,flexShrink:0,border:"1px solid #E2E8F0",userSelect:"none",fontWeight:700}}>?</span>
      {show&&<span style={{position:"absolute",bottom:"calc(100% + 6px)",left:0,zIndex:9999,background:"#1E293B",color:"#F1F5F9",fontSize:12,padding:"8px 12px",borderRadius:8,whiteSpace:"pre-wrap",maxWidth:220,lineHeight:1.6,boxShadow:"0 4px 20px rgba(0,0,0,0.3)",pointerEvents:"none",minWidth:160}}>
        {text}<span style={{position:"absolute",top:"100%",left:12,border:"5px solid transparent",borderTopColor:"#1E293B"}}/>
      </span>}
    </span>
  );
}
function Badge({status}){
  const s=STATUS_STYLE[status]||{bg:"#F3F4F6",text:"#374151",border:"#D1D5DB"};
  return<span style={{background:s.bg,color:s.text,border:`1px solid ${s.border}`,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{status}</span>;
}
function Card({children,style,accent}){

}
function MetricCard({label,value,sub,warn,tip}){

    <div style={{background:warn?"#FFF1F2":"var(--clr-bg)",border:`1.5px solid ${warn?"#FECDD3":"#E2E8F0"}`,borderRadius:10,padding:"0.875rem 1rem"}}>

      {sub&&<div style={{fontSize:11,color:warn?"#FB7185":"#64748B",marginTop:2}}>{sub}</div>}
    </div>
  );
}
function ProgressBar({value,max,label,color}){
  const pct=Math.min(100,max>0?Math.round((value/max)*100):0);
  const c=pct>=90?"#EF4444":pct>=70?"#F59E0B":(color||"var(--clr-primary)");
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#64748B",marginBottom:4}}>
        <span>{label}</span><span style={{color:pct>=90?"#EF4444":"#64748B",fontWeight:pct>=90?700:400}}>{pct}%</span>
      </div>
      <div style={{height:7,background:"#E2E8F0",borderRadius:4,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:c,borderRadius:4,transition:"width 0.5s"}}/>
      </div>
    </div>
  );
}

// ── HOME ───────────────────────────────────────────────────
function HomeTab({jobs,clients,settings,expenses}){
  const[compact,setCompact]=useState(false);
  const tm=thisMonth(),ty=thisYear();
  const gc=id=>clients.find(c=>c.id===id);
  const paid=jobs.filter(j=>["納品済","入金済"].includes(j.status));
  const incM=paid.filter(j=>j.receiveDate?.startsWith(tm)).reduce((s,j)=>s+totalPrice(j),0);
  const incY=paid.filter(j=>j.receiveDate?.startsWith(ty)).reduce((s,j)=>s+totalPrice(j),0);
  const jobsM=jobs.filter(j=>j.receiveDate?.startsWith(tm)).length;
  const inProg=jobs.filter(j=>["受付","制作中","修正中"].includes(j.status));
  const urgent=inProg.filter(j=>daysUntil(j.deadline)<=3);
  const hrAlerts=inProg.filter(j=>j.actualHours>0&&hrRate(totalPrice(j),j.actualHours)<settings.alertHourlyRate);
  const reqExp=expenses.filter(e=>e.level===1&&e.type==="monthly").reduce((s,e)=>s+Number(e.amount),0);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <h2 style={{fontSize:18,fontWeight:700,color:"#1E293B"}}>ダッシュボード</h2>
        <button onClick={()=>setCompact(c=>!c)} style={{fontSize:12,padding:"4px 12px"}}>{compact?"詳細表示":"コンパクト"}</button>
      </div>
      {urgent.length>0&&<div style={{background:"#FFF1F2",border:"1.5px solid #FECDD3",borderRadius:10,padding:"10px 14px",marginBottom:10,fontSize:13,color:"#BE123C",display:"flex",gap:8}}>
        <i className="ti ti-bell" style={{fontSize:16,flexShrink:0,marginTop:1}}/>
        <div><strong>締め切り間近：</strong>{urgent.map(j=>`${gc(j.clientId)?.name}「${j.type}」あと${daysUntil(j.deadline)}日`).join("　/　")}</div>
      </div>}
      {hrAlerts.length>0&&<div style={{background:"#FFF7ED",border:"1.5px solid #FED7AA",borderRadius:10,padding:"10px 14px",marginBottom:10,fontSize:13,color:"#C2410C",display:"flex",gap:8}}>
        <i className="ti ti-alert-triangle" style={{fontSize:16,flexShrink:0,marginTop:1}}/>
        <div><strong>時給アラート：</strong>{hrAlerts.map(j=>`${gc(j.clientId)?.name} 現在${yen(hrRate(totalPrice(j),j.actualHours))}/h`).join(" / ")}　目標{yen(settings.alertHourlyRate)}/h 未満</div>
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:"1rem"}}>
        <MetricCard label="今月収益" value={yen(incM)} sub={`年間 ${yen(incY)}`}/>
        <MetricCard label="今月案件数" value={`${jobsM}件`} sub={`上限まで${settings.monthlyJobLimit-jobsM}件`} warn={jobsM>=settings.monthlyJobLimit}/>
        <MetricCard label="進行中" value={`${inProg.length}件`}/>
        <MetricCard label="手取り試算" value={yen(incM-reqExp)} sub="収益－必要経費"/>
      </div>
      {!compact&&<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:"1rem"}}>
        <ProgressBar value={incY} max={settings.incomeLimit} label={`年収益上限 (${settings.incomeLimitType}) ${yen(settings.incomeLimit)}`}/>
        <ProgressBar value={jobsM} max={settings.monthlyJobLimit} label={`月間案件数 ${jobsM}/${settings.monthlyJobLimit}件`} color="#60A5FA"/>
      </div>}
      <Card>
        <div style={{fontSize:14,fontWeight:700,marginBottom:10,color:"#1E293B"}}>進行中の案件</div>
        {inProg.length===0?<div style={{color:"#64748B",fontSize:13}}>進行中の案件はありません</div>:
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {inProg.map(j=>{
            const cl=gc(j.clientId),tp=totalPrice(j);
            const rate=j.actualHours>0?hrRate(tp,j.actualHours):null;
            const rw=rate!==null&&rate<settings.alertHourlyRate;
            return(<div key={j.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:"var(--clr-bg)",borderRadius:8,border:`1.5px solid ${rw?"#FED7AA":"#E2E8F0"}`,flexWrap:"wrap"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:cl?.color||"#ccc",flexShrink:0}}/>
              <Badge status={j.status}/>
              <span style={{flex:1,fontSize:13,fontWeight:600,minWidth:70}}>{cl?.name}</span>
              {!compact&&<span style={{fontSize:12,color:"#64748B"}}>{j.type}</span>}
              <span style={{fontSize:12,fontWeight:600}}>{yen(tp)}</span>
              {rate!==null&&<span style={{fontSize:11,color:rw?"#C2410C":"#64748B",background:rw?"#FFF7ED":"transparent",padding:rw?"1px 6px":0,borderRadius:4}}>{yen(rate)}/h</span>}
              <span style={{fontSize:12,color:daysUntil(j.deadline)<=3?"#EF4444":"#64748B"}}>締切{j.deadline}({daysUntil(j.deadline)}日後)</span>
            </div>);
          })}
        </div>}
      </Card>
    </div>
  );
}

  function hType(name){const t=settings.jobTypes.find(x=>x.name===name);setForm(f=>({...f,type:name,estimatedHours:t?.hours||f.estimatedHours,basePrice:t?.defaultPrice||f.basePrice}));}
  function addAddon(){setForm(f=>({...f,addOns:[...f.addOns,{id:Date.now(),reason:"その他",customReason:"",amount:0}]}));}
  function upAddon(id,field,val){setForm(f=>({...f,addOns:f.addOns.map(a=>a.id===id?{...a,[field]:val}:a)}));}
  function rmAddon(id){setForm(f=>({...f,addOns:f.addOns.filter(a=>a.id!==id)}));}
  function togCk(id){setForm(f=>({...f,checklist:f.checklist.map(c=>c.id===id?{...c,done:!c.done}:c)}));}
  function addCk(){if(!newCk.trim())return;setForm(f=>({...f,checklist:[...f.checklist,{id:Date.now(),text:newCk.trim(),done:false}]}));setNewCk("");}
  function rmCk(id){setForm(f=>({...f,checklist:f.checklist.filter(c=>c.id!==id)}));}
  function save(){if(!form.clientId||!form.deadline)return alert("クライアントと締め切り日は必須です");
    onSave({...form,basePrice:Number(form.basePrice),estimatedHours:Number(form.estimatedHours),actualHours:Number(form.actualHours)});onClose();}
  const inp={width:"100%",boxSizing:"border-box"};
  const sect={background:"#F8FAFC",borderRadius:10,border:"1.5px solid #E2E8F0",padding:"12px 14px"};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {hw&&<div style={{background:"#FFF1F2",border:"1.5px solid #FECDD3",borderRadius:8,padding:"8px 12px",fontSize:13,color:"#BE123C"}}>
        <i className="ti ti-alert-triangle" style={{marginRight:6}}/>作業可能時間が不足しています（必要:{form.estimatedHours}h / 確保可能:{daysAvail?.toFixed(1)}h）
      </div>}
      {selCl?.paymentDelay&&<div style={{background:"#FFF7ED",border:"1.5px solid #FED7AA",borderRadius:8,padding:"8px 12px",fontSize:13,color:"#C2410C"}}>
        <i className="ti ti-shield-exclamation" style={{marginRight:6}}/>このクライアントは過去に入金遅延があります。前払いを推奨します。
      </div>}
      <div className="grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div>
          <Lbl required>クライアント</Lbl>
          <select value={form.clientId||""} onChange={e=>setForm(f=>({...f,clientId:Number(e.target.value)}))} style={inp}>
            <option value="">選択</option>
            {clients.map(c=><option key={c.id} value={c.id}>{c.name}{c.paymentDelay?" ⚠":""}</option>)}
          </select>
          <button onClick={()=>setAddingCl(true)} style={{fontSize:11,marginTop:4,padding:"2px 8px",color:"var(--clr-primary)",borderColor:"var(--clr-primary)",background:"transparent"}}>+ 新規クライアント</button>
        </div>
        <div><Lbl tip={TOOLTIPS.jobType}>作業種別</Lbl><select value={form.type} onChange={e=>hType(e.target.value)} style={inp}>{settings.jobTypes.map(t=><option key={t.id}>{t.name}</option>)}</select></div>
      </div>
      <div className="grid-3" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        <div><Lbl>ステータス</Lbl><select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={inp}>{STATUS_LIST.map(s=><option key={s}>{s}</option>)}</select></div>
        <div><Lbl>支払方法</Lbl><select value={form.paymentType} onChange={e=>setForm(f=>({...f,paymentType:e.target.value}))} style={inp}><option>前払い</option><option>後払い</option></select></div>
        <div><Lbl>推定工数(h)</Lbl><input type="number" value={form.estimatedHours} onChange={e=>setForm(f=>({...f,estimatedHours:e.target.value}))} style={inp} step="0.5"/></div>
      </div>
      <div className="grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><Lbl>受付日</Lbl><input type="date" value={form.receiveDate} onChange={e=>setForm(f=>({...f,receiveDate:e.target.value}))} style={inp}/></div>
        <div><Lbl required>締め切り日</Lbl><input type="date" value={form.deadline} onChange={e=>setForm(f=>({...f,deadline:e.target.value}))} style={inp}/></div>
        <div><Lbl>取り掛かり日</Lbl><input type="date" value={form.startDate} onChange={e=>setForm(f=>({...f,startDate:e.target.value}))} style={inp}/></div>
        <div><Lbl>目標納品日</Lbl><input type="date" value={form.targetDate} onChange={e=>setForm(f=>({...f,targetDate:e.target.value}))} style={inp}/></div>
      </div>
      <div style={sect}>
        <div style={{fontSize:13,fontWeight:700,color:"#334155",marginBottom:8}}>料金設定</div>
        <div className="grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
          <div>
            <Lbl>基本料金</Lbl>
            <input type="number" value={form.basePrice} onChange={e=>setForm(f=>({...f,basePrice:e.target.value}))} style={inp}/>
            {selType&&form.basePrice!=selType.defaultPrice&&<div style={{fontSize:11,color:form.basePrice>selType.defaultPrice?"#15803D":"#BE123C",marginTop:3}}>標準{yen(selType.defaultPrice)}から{form.basePrice>selType.defaultPrice?"+":""}{yen(form.basePrice-selType.defaultPrice)}</div>}
          </div>
          <div><Lbl>実績工数(h)</Lbl><input type="number" value={form.actualHours} onChange={e=>setForm(f=>({...f,actualHours:e.target.value}))} style={inp} step="0.5"/></div>
        </div>
        <Lbl tip={TOOLTIPS.addOnPrice}>追加料金</Lbl>
        {form.addOns.map(a=>(
          <div key={a.id} style={{display:"grid",gridTemplateColumns:"1fr 1fr 80px 28px",gap:6,marginBottom:6,alignItems:"center"}}>
            <select value={a.reason} onChange={e=>upAddon(a.id,"reason",e.target.value)} style={{fontSize:12,padding:"5px 6px",borderRadius:6,border:"1.5px solid #E2E8F0"}}>{ADDON_REASONS.map(r=><option key={r}>{r}</option>)}</select>
            <input placeholder="詳細" value={a.customReason} onChange={e=>upAddon(a.id,"customReason",e.target.value)} style={{fontSize:12,padding:"5px 8px"}}/>
            <input type="number" value={a.amount} onChange={e=>upAddon(a.id,"amount",e.target.value)} style={{fontSize:12,padding:"5px 8px"}} placeholder="金額"/>
            <button onClick={()=>rmAddon(a.id)} style={{padding:"4px",color:"#EF4444",border:"1px solid #FECDD3",background:"#FFF1F2",borderRadius:6,fontWeight:700,fontSize:14}}>×</button>
          </div>
        ))}
        <button onClick={addAddon} style={{fontSize:12,padding:"3px 10px",color:"var(--clr-primary)",borderColor:"var(--clr-primary)",background:"transparent"}}>+ 追加料金を追加</button>
        <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #E2E8F0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,color:"#64748B"}}>請求合計</span>
          <span style={{fontSize:20,fontWeight:700,color:"#1E293B"}}>{yen(tp)}</span>
        </div>
        {rate>0&&<div style={{fontSize:12,color:rw?"#C2410C":"#64748B",marginTop:3}}>推定時給: {yen(rate)}/h{rw?` ⚠ 目標${yen(settings.alertHourlyRate)}/h未満`:""}</div>}
        {actRate>0&&<div style={{fontSize:12,color:arw?"#C2410C":"#15803D",marginTop:2}}>実績時給: {yen(actRate)}/h</div>}
        {(rw||arw)&&<div style={{fontSize:12,color:"#92400E",background:"#FFFBEB",borderRadius:6,padding:"6px 10px",marginTop:6,lineHeight:1.7}}>
          💡 目標時給{yen(settings.alertHourlyRate)}/hにするには請求を<strong>{yen(settings.alertHourlyRate*Number(form.actualHours||form.estimatedHours))}</strong>以上にするか、追加料金で調整してください。
        </div>}
      </div>
      <div style={sect}>
        <div style={{fontSize:13,fontWeight:700,color:"#334155",marginBottom:8,display:"flex",alignItems:"center",gap:4}}>
          チェックリスト <span style={{fontSize:12,color:"#64748B",fontWeight:400}}>{form.checklist.filter(c=>c.done).length}/{form.checklist.length}</span>
        </div>
        {form.checklist.map(c=>(
          <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
            <input type="checkbox" checked={c.done} onChange={()=>togCk(c.id)} style={{width:15,height:15,accentColor:"var(--clr-primary)",flexShrink:0}}/>
            <span style={{flex:1,fontSize:13,textDecoration:c.done?"line-through":"none",color:c.done?"#94A3B8":"#334155"}}>{c.text}</span>
            <button onClick={()=>rmCk(c.id)} style={{fontSize:12,padding:"1px 6px",color:"#94A3B8",border:"none",background:"none"}}>×</button>
          </div>
        ))}
        <div style={{display:"flex",gap:6,marginTop:6}}>
          <input value={newCk} onChange={e=>setNewCk(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCk()} placeholder="項目を追加..." style={{flex:1,fontSize:12}}/>
          <button onClick={addCk} style={{fontSize:12,padding:"4px 10px"}}>追加</button>
        </div>
      </div>
      <div><Lbl>メモ</Lbl><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={{width:"100%",height:56,boxSizing:"border-box",resize:"vertical",fontSize:13}}/></div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",borderTop:"1px solid #E2E8F0",paddingTop:12}}>
        <button onClick={onClose}>キャンセル</button>
        <button onClick={save} style={{background:"var(--clr-primary)",color:"#fff",border:"none",borderRadius:8,padding:"7px 22px",fontWeight:700,cursor:"pointer"}}>保存する</button>
      </div>
      {addingCl&&<Modal title="新規クライアント" onClose={()=>setAddingCl(false)}>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><Lbl>クライアント名</Lbl><input value={newClName} onChange={e=>setNewClName(e.target.value)} style={{width:"100%",boxSizing:"border-box"}}/></div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setAddingCl(false)}>キャンセル</button>
            <button onClick={()=>{if(newClName.trim()){const nc={id:Date.now(),name:newClName.trim(),paymentMethod:"銀行振込",paymentDelay:false,color:CLIENT_PALETTE[Math.floor(Math.random()*CLIENT_PALETTE.length)],note:""};onAddClient(nc);setForm(f=>({...f,clientId:nc.id}));setAddingCl(false);}}} style={{background:"var(--clr-primary)",color:"#fff",border:"none",borderRadius:8,padding:"6px 18px",fontWeight:700,cursor:"pointer"}}>追加</button>
          </div>
        </div>
      </Modal>}
    </div>
  );
}

// ── JOBS TAB ───────────────────────────────────────────────
function JobsTab({jobs,setJobs,clients,setClients,settings}){
  const[modal,setModal]=useState(false);
  const[editJob,setEditJob]=useState(null);
  const[filterS,setFilterS]=useState("すべて");
  const[compact,setCompact]=useState(false);
  const[confirmDel,setConfirmDel]=useState(null);
  const gc=id=>clients.find(c=>c.id===id);
  function saveJob(job){setJobs(prev=>{const i=prev.findIndex(j=>j.id===job.id);if(i>=0){const n=[...prev];n[i]=job;return n;}return[...prev,{...job,id:Date.now()}];});}
  const filtered=filterS==="すべて"?jobs:jobs.filter(j=>j.status===filterS);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:8}}>
        <h2 style={{fontSize:18,fontWeight:700,color:"#1E293B"}}>案件管理</h2>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setCompact(c=>!c)} style={{fontSize:12,padding:"4px 10px"}}>{compact?"詳細":"コンパクト"}</button>
          <button onClick={()=>{setEditJob(null);setModal(true);}} style={{background:"var(--clr-primary)",color:"#fff",border:"none",borderRadius:8,padding:"6px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}><i className="ti ti-plus"/> 新規案件</button>
        </div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:"1rem"}}>
        {["すべて",...STATUS_LIST].map(s=>(
          <button key={s} onClick={()=>setFilterS(s)} style={{fontSize:12,padding:"4px 12px",fontWeight:filterS===s?700:400,background:filterS===s?"var(--clr-primary)":"transparent",color:filterS===s?"#fff":"#64748B",border:`1.5px solid ${filterS===s?"var(--clr-primary)":"#E2E8F0"}`,borderRadius:20}}>{s}</button>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.length===0&&<div style={{color:"#64748B",fontSize:13,padding:"1rem"}}>案件がありません</div>}
        {filtered.map(j=>{
          const cl=gc(j.clientId),tp=totalPrice(j);
          const rate=j.actualHours>0?hrRate(tp,j.actualHours):j.estimatedHours>0?hrRate(tp,j.estimatedHours):null;
          const rw=rate!==null&&rate<settings.alertHourlyRate;
          const ck=j.checklist.filter(c=>c.done).length;
          return(
            <Card key={j.id} style={{padding:"0.875rem 1rem"}} accent={rw?"#FED7AA":undefined}>
              <div style={{display:"flex",alignItems:"flex-start",gap:8,flexWrap:"wrap"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:cl?.color||"#ccc",flexShrink:0,marginTop:4}}/>
                <Badge status={j.status}/>
                <div style={{flex:1,minWidth:80}}>
                  <div style={{fontWeight:700,fontSize:14,color:"#1E293B"}}>{cl?.name}</div>
                  {!compact&&<div style={{fontSize:12,color:"#64748B",marginTop:2}}>{j.type} · 推定{j.estimatedHours}h{j.actualHours>0?` / 実績${j.actualHours}h`:""}</div>}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontWeight:700,fontSize:14}}>{yen(tp)}</div>
                  {rate!==null&&<div style={{fontSize:11,color:rw?"#C2410C":"#64748B"}}>{yen(rate)}/h{rw?" ⚠":""}</div>}
                </div>
                {!compact&&<div style={{fontSize:12,color:"#64748B",textAlign:"right"}}>
                  <div>締切:{j.deadline}</div>
                  <div style={{marginTop:2}}>✓ {ck}/{j.checklist.length}</div>
                </div>}
                <div style={{display:"flex",gap:4}}>
                  <button onClick={()=>{setEditJob(j);setModal(true);}} style={{padding:"3px 8px",fontSize:13,borderRadius:6}}><i className="ti ti-edit"/></button>
                  <button onClick={()=>setConfirmDel(j.id)} style={{padding:"3px 8px",fontSize:13,borderRadius:6,color:"#fff",background:"#EF4444",border:"1px solid #EF4444"}}><i className="ti ti-trash"/></button>
                </div>
              </div>
              {!compact&&j.notes&&<div style={{fontSize:12,color:"#64748B",marginTop:8,paddingTop:8,borderTop:"1px solid #E2E8F0"}}>{j.notes}</div>}
            </Card>
          );
        })}
      </div>
      {modal&&<Modal title={editJob?"案件を編集":"新規案件登録"} onClose={()=>setModal(false)} wide>
        <JobModal job={editJob} clients={clients} settings={settings} onSave={saveJob} onAddClient={nc=>setClients(p=>[...p,nc])} onClose={()=>setModal(false)}/>
      </Modal>}
      {confirmDel&&<Confirm message="この案件を削除しますか？この操作は元に戻せません。" onConfirm={()=>{setJobs(p=>p.filter(j=>j.id!==confirmDel));setConfirmDel(null);}} onCancel={()=>setConfirmDel(null)}/>}
    </div>
  );
}

// ── CALENDAR ───────────────────────────────────────────────
function CalendarTab({jobs,clients,settings}){
  const[yr,setYr]=useState(new Date().getFullYear());
  const[mo,setMo]=useState(new Date().getMonth());
  const[vt,setVt]=useState(settings.calendarView);
  const[dt,setDt]=useState(settings.calendarDateType);
  const gc=id=>clients.find(c=>c.id===id);
  const first=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  const cells=[...Array(first).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
  const ds=d=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const todStr=toDay();
  function inRange(j,d){const date=ds(d),start=j.startDate||j.receiveDate,end=dt==="targetDate"?(j.targetDate||j.deadline):j.deadline;return date>=start&&date<=end;}
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:8}}>
        <h2 style={{fontSize:18,fontWeight:700,color:"#1E293B"}}>カレンダー</h2>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <select value={vt} onChange={e=>setVt(e.target.value)} style={{fontSize:12,padding:"5px 8px",width:"auto"}}><option value="bar">バー表示</option><option value="dot">点のみ</option></select>
          <select value={dt} onChange={e=>setDt(e.target.value)} style={{fontSize:12,padding:"5px 8px",width:"auto"}}><option value="deadline">締め切り基準</option><option value="targetDate">目標納品日基準</option><option value="start">取り掛かり基準</option></select>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <button onClick={()=>mo===0?(setYr(y=>y-1),setMo(11)):setMo(m=>m-1)} style={{padding:"4px 10px"}}>‹</button>
            <span style={{fontSize:13,fontWeight:700,minWidth:80,textAlign:"center"}}>{yr}年{mo+1}月</span>
            <button onClick={()=>mo===11?(setYr(y=>y+1),setMo(0)):setMo(m=>m+1)} style={{padding:"4px 10px"}}>›</button>
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>{clients.map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#64748B"}}><div style={{width:9,height:9,borderRadius:"50%",background:c.color}}/>{c.name}</div>)}</div>
      <Card style={{padding:"0.75rem"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:4}}>
          {["日","月","火","水","木","金","土"].map((d,i)=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:i===0?"#EF4444":i===6?"#60A5FA":"#64748B",padding:"4px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {cells.map((d,i)=>{
            if(!d)return<div key={i}/>;
            const dateStr=ds(d),isToday=dateStr===todStr;
            const rj=vt==="bar"?jobs.filter(j=>inRange(j,d)):[];
            const dj=vt==="dot"?jobs.filter(j=>{if(dt==="deadline")return j.deadline===dateStr;if(dt==="targetDate")return j.targetDate===dateStr;return j.startDate===dateStr;}):[];
            const isSun=(first+d-1)%7===0,isSat=(first+d-1)%7===6;
            return(
              <div key={i} style={{minHeight:52,padding:"3px 4px",borderRadius:6,background:isToday?"var(--clr-primary-soft,#EEF2FF)":"transparent",border:`1px solid ${isToday?"var(--clr-primary)":"#E2E8F0"}`}}>
                <div style={{fontSize:12,fontWeight:isToday?700:400,color:isToday?"var(--clr-primary)":isSun?"#EF4444":isSat?"#60A5FA":"#1E293B",marginBottom:2}}>{d}</div>
                {vt==="dot"?<div style={{display:"flex",flexWrap:"wrap",gap:2}}>{dj.map(j=><div key={j.id} title={gc(j.clientId)?.name} style={{width:7,height:7,borderRadius:"50%",background:gc(j.clientId)?.color||"#888"}}/>)}</div>
                :rj.map(j=><div key={j.id} title={`${gc(j.clientId)?.name} ${j.type}`} style={{fontSize:10,background:gc(j.clientId)?.color||"#888",color:"#fff",borderRadius:3,padding:"1px 3px",marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{gc(j.clientId)?.name?.slice(0,4)}</div>)}
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

// ── FINANCE ────────────────────────────────────────────────
function FinanceTab({jobs,expenses,setExpenses,settings,setSettings}){
  const[expLv,setExpLv]=useState([1,2,3]);
  const[showAdd,setShowAdd]=useState(false);
  const[newExp,setNewExp]=useState({name:"",amount:0,type:"monthly",level:1});
  const[custom,setCustom]=useState(settings.incomeLimit);
  const[confirmDel,setConfirmDel]=useState(null);
  const tm=thisMonth(),ty=thisYear();
  const paid=jobs.filter(j=>["納品済","入金済"].includes(j.status));
  const incM=paid.filter(j=>j.receiveDate?.startsWith(tm)).reduce((s,j)=>s+totalPrice(j),0);
  const incY=paid.filter(j=>j.receiveDate?.startsWith(ty)).reduce((s,j)=>s+totalPrice(j),0);
  const filtE=expenses.filter(e=>expLv.includes(e.level));
  const mExp=filtE.filter(e=>e.type==="monthly").reduce((s,e)=>s+Number(e.amount),0);
  const oExp=filtE.filter(e=>e.type==="one-time").reduce((s,e)=>s+Number(e.amount),0);
  function setWall(label){const w=INCOME_WALLS.find(x=>x.label===label);if(w?.value)setSettings(s=>({...s,incomeLimitType:label,incomeLimit:w.value}));else setSettings(s=>({...s,incomeLimitType:"自由設定"}));}
  return(
    <div>
      <h2 style={{fontSize:18,fontWeight:700,color:"#1E293B",marginBottom:"1rem"}}>財務管理</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:"1rem"}}>
        <MetricCard label="今月収益" value={yen(incM)}/><MetricCard label="今年収益" value={yen(incY)}/>
        <MetricCard label="今月経費" value={yen(mExp+oExp)}/><MetricCard label="手取り試算" value={yen(incM-mExp-oExp)} warn={incM-mExp-oExp<0}/>
      </div>

// ── ANALYSIS ───────────────────────────────────────────────
function AnalysisTab({jobs,clients,settings}){
  const gc=id=>clients.find(c=>c.id===id);
  const paid=jobs.filter(j=>["納品済","入金済"].includes(j.status));
  const cStats=useMemo(()=>{
    const m={};
    jobs.forEach(j=>{const cl=gc(j.clientId),k=j.clientId;if(!m[k])m[k]={name:cl?.name||"不明",color:cl?.color,count:0,total:0,disc:0};
      m[k].count++;m[k].total+=totalPrice(j);const t=settings.jobTypes.find(x=>x.name===j.type);if(t&&totalPrice(j)<t.defaultPrice)m[k].disc+=(t.defaultPrice-totalPrice(j));});
    return Object.values(m).sort((a,b)=>b.total-a.total);
  },[jobs,clients]);
  const mData=useMemo(()=>{
    const m={};paid.forEach(j=>{const mo=j.receiveDate?.slice(0,7);if(!mo)return;if(!m[mo])m[mo]={month:mo,income:0,count:0};m[mo].income+=totalPrice(j);m[mo].count++;});
    return Object.values(m).sort((a,b)=>a.month.localeCompare(b.month)).slice(-6);
  },[jobs]);
  const maxInc=Math.max(...mData.map(m=>m.income),1);
  const hrRates=settings.jobTypes.map(t=>({...t,rate:t.hours>0?Math.round(t.defaultPrice/t.hours):0}));
  return(
    <div>
      <h2 style={{fontSize:18,fontWeight:700,color:"#1E293B",marginBottom:"1rem"}}>分析・レポート</h2>
      <Card style={{marginBottom:"1rem"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:12,color:"#1E293B"}}>月別収益推移</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:8,height:110}}>
          {mData.map(m=>(
            <div key={m.month} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{fontSize:10,color:"#64748B"}}>{yen(m.income)}</div>
              <div style={{width:"100%",background:"var(--clr-primary)",borderRadius:"4px 4px 0 0",height:`${Math.max(4,Math.round((m.income/maxInc)*72))}px`}}/>
              <div style={{fontSize:11,color:"#64748B"}}>{m.month.slice(5)}月</div>
            </div>
          ))}
          {mData.length===0&&<div style={{color:"#64748B",fontSize:13}}>データがありません</div>}
        </div>
      </Card>
      <Card style={{marginBottom:"1rem"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:10,color:"#1E293B"}}>クライアント別売上</div>
        {cStats.map((c,i)=>(
          <div key={c.name} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
              <span style={{fontWeight:i===0?700:400,color:"#1E293B",display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:c.color,display:"inline-block"}}/>{c.name}<span style={{color:"#64748B",fontWeight:400,fontSize:12}}>({c.count}件)</span>
              </span>
              <span style={{fontWeight:600}}>{yen(c.total)}{c.disc>0&&<span style={{color:"#BE123C",fontSize:11,marginLeft:8}}>値引き{yen(c.disc)}</span>}</span>
            </div>
            <div style={{height:6,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.round((c.total/(cStats[0]?.total||1))*100)}%`,background:c.color,borderRadius:3}}/>
            </div>
          </div>
        ))}
      </Card>
      <Card>
        <div style={{fontSize:14,fontWeight:700,marginBottom:10,color:"#1E293B",display:"flex",alignItems:"center",gap:4}}><Tooltip text={TOOLTIPS.jobType}>時間単価分析</Tooltip></div>
        {hrRates.map(t=>{
          const isLow=t.rate<settings.alertHourlyRate;
          return(
            <div key={t.id} style={{marginBottom:10,padding:"10px 12px",background:isLow?"#FFF7ED":"var(--clr-bg)",borderRadius:10,border:`1.5px solid ${isLow?"#FED7AA":"#E2E8F0"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontWeight:700,fontSize:13,color:"#1E293B"}}>{t.name}</div><div style={{fontSize:12,color:"#64748B",marginTop:2}}>{yen(t.defaultPrice)} ÷ {t.hours}h</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:700,color:isLow?"#C2410C":"#15803D"}}>{yen(t.rate)}/h</div>{isLow&&<div style={{fontSize:11,color:"#C2410C"}}>⚠ 目標{yen(settings.alertHourlyRate)}/h未満</div>}</div>
              </div>
              {isLow&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #FED7AA",fontSize:12,color:"#92400E",lineHeight:1.7}}>
                💡 目標時給にするには単価を<strong>{yen(settings.alertHourlyRate*t.hours)}</strong>以上にするか、作業時間を<strong>{Math.round(t.defaultPrice/settings.alertHourlyRate*10)/10}h</strong>以内に短縮してください。
              </div>}
            </div>
          );
        })}
      </Card>
    </div>
  );
}

// ── INVOICE ────────────────────────────────────────────────
function InvoiceTab({jobs,clients}){

  const invJ=jobs.filter(j=>selJ.includes(j.id));const invTotal=invJ.reduce((s,j)=>s+totalPrice(j),0);
  const clName=gc(invJ[0]?.clientId)?.name||"クライアント名";const payM=gc(invJ[0]?.clientId)?.paymentMethod||"銀行振込";

          <div><Lbl>対象月</Lbl><input type="month" value={selMo} onChange={e=>setSelMo(e.target.value)} style={{width:"100%",boxSizing:"border-box"}}/></div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {elig.length===0&&<div style={{color:"#64748B",fontSize:13}}>該当案件がありません</div>}
          {elig.map(j=>{const cl=gc(j.clientId);return(<label key={j.id} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"6px 8px",borderRadius:8,background:selJ.includes(j.id)?"var(--clr-bg)":"transparent"}}>
            <input type="checkbox" checked={selJ.includes(j.id)} onChange={()=>setSelJ(p=>p.includes(j.id)?p.filter(x=>x!==j.id):[...p,j.id])} style={{accentColor:"var(--clr-primary)"}}/>
            <Badge status={j.status}/><span style={{flex:1,fontSize:13,color:"#1E293B"}}>{cl?.name} — {j.type}</span>
            <span style={{fontSize:13,fontWeight:600}}>{yen(totalPrice(j))}</span>
          </label>);})}
        </div>
        <div style={{marginTop:10,display:"flex",gap:8,justifyContent:"space-between",flexWrap:"wrap"}}>
          <button onClick={()=>setSelJ(elig.map(j=>j.id))} style={{fontSize:12}}>すべて選択</button>

            <select value={addonDisp} onChange={e=>setAddonDisp(e.target.value)} style={{fontSize:12,padding:"4px 8px",width:"auto"}}><option value="separate">追加料金を別行表示</option><option value="merged">まとめて表示</option></select>
            <input value={invNum} onChange={e=>setInvNum(e.target.value)} style={{fontSize:12,width:140}}/>

          </table>
          <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #E2E8F0",fontSize:13,color:"#64748B"}}>お支払い方法: <strong style={{color:"#334155"}}>{payM}</strong></div>
        </div>
      </Card>}
    </div>
  );
}

// ── CONTRACT ───────────────────────────────────────────────
function ContractTab({jobs,clients,settings}){
  const[selJob,setSelJob]=useState("");

          {jobs.map(j=><option key={j.id} value={j.id}>{gc(j.clientId)?.name} — {j.type} ({j.receiveDate})</option>)}
        </select>
        {job&&<><div className="grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><Lbl>修正回数</Lbl><input type="number" value={form.revisions} onChange={e=>setForm(f=>({...f,revisions:e.target.value}))} style={{width:"100%",boxSizing:"border-box"}}/></div>

      {generated&&<Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:14,fontWeight:700,color:"#1E293B"}}>受注書（編集可能）</div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>navigator.clipboard?.writeText(editTxt).then(()=>alert("コピーしました"))} style={{fontSize:12,padding:"4px 10px"}}><i className="ti ti-copy"/> コピー</button>
            <button onClick={()=>window.print()} className="no-print" style={{fontSize:12,padding:"4px 10px"}}><i className="ti ti-printer"/> 印刷</button>
          </div>
        </div>
        <textarea value={editTxt} onChange={e=>setEditTxt(e.target.value)} style={{width:"100%",height:400,boxSizing:"border-box",fontFamily:"monospace",fontSize:12,lineHeight:1.8,border:"1.5px solid #E2E8F0",borderRadius:8,padding:"12px",resize:"vertical",color:"#334155",background:"#FAFAFA"}}/>
      </Card>}
    </div>
  );
}

// ── SETTINGS ───────────────────────────────────────────────
function SettingsTab({settings,setSettings,clients,setClients}){
  const[local,setLocal]=useState(settings);const[confirmDel,setConfirmDel]=useState(null);const[editCl,setEditCl]=useState(null);
  function save(){setSettings(local);alert("設定を保存しました");}
  function upJT(id,field,val){setLocal(s=>({...s,jobTypes:s.jobTypes.map(t=>t.id===id?{...t,[field]:field==="name"?val:Number(val)}:t)}));}
  function rmJT(id){setLocal(s=>({...s,jobTypes:s.jobTypes.filter(t=>t.id!==id)}));setConfirmDel(null);}
  const theme=PASTEL_THEMES.find(t=>t.id===local.themeId)||PASTEL_THEMES[0];
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <h2 style={{fontSize:18,fontWeight:700,color:"#1E293B"}}>設定</h2>
        <button onClick={save} style={{background:"var(--clr-primary)",color:"#fff",border:"none",borderRadius:8,padding:"6px 22px",fontWeight:700,cursor:"pointer"}}>保存する</button>
      </div>
      <Card style={{marginBottom:"1rem"}}>
        <div style={{fontSize:14,fontWeight:700,color:"#1E293B",marginBottom:10}}>テーマ・表示</div>
        <div style={{marginBottom:12}}>
          <Lbl>テーマカラー（{theme.label}）</Lbl>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:6}}>
            {PASTEL_THEMES.map(t=><button key={t.id} onClick={()=>setLocal(s=>({...s,themeId:t.id}))} title={t.label} style={{width:36,height:36,borderRadius:"50%",background:t.primary,border:local.themeId===t.id?"3px solid #1E293B":`3px solid ${t.primary}`,cursor:"pointer",position:"relative",padding:0}}>
              {local.themeId===t.id&&<span style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:16}}>✓</span>}
            </button>)}
          </div>
        </div>
        <div><Lbl>フォントサイズ: {local.fontSize}px</Lbl><input type="range" min={12} max={18} step={1} value={local.fontSize} onChange={e=>setLocal(s=>({...s,fontSize:Number(e.target.value)}))} style={{width:"100%"}}/></div>
      </Card>
      <Card style={{marginBottom:"1rem"}}>
        <div style={{fontSize:14,fontWeight:700,color:"#1E293B",marginBottom:10}}>作業ルール</div>
        <div className="grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><Lbl tip={TOOLTIPS.workHours}>1日の作業時間（h）</Lbl><input type="number" value={local.workHoursPerDay} onChange={e=>setLocal(s=>({...s,workHoursPerDay:Number(e.target.value)}))} style={{width:"100%",boxSizing:"border-box"}}/></div>
          <div><Lbl tip={TOOLTIPS.monthlyLimit}>月間案件上限数</Lbl><input type="number" value={local.monthlyJobLimit} onChange={e=>setLocal(s=>({...s,monthlyJobLimit:Number(e.target.value)}))} style={{width:"100%",boxSizing:"border-box"}}/></div>
          <div style={{gridColumn:"1/-1"}}>
            <Lbl tip={TOOLTIPS.alertHourlyRate}>時給アラート: {yen(local.alertHourlyRate)}/h</Lbl>
            <input type="range" min={500} max={5000} step={100} value={local.alertHourlyRate} onChange={e=>setLocal(s=>({...s,alertHourlyRate:Number(e.target.value)}))} style={{width:"100%"}}/>
            <div style={{fontSize:12,color:"#64748B",marginTop:2}}>この時給を下回る案件にアラートが表示されます</div>
          </div>
        </div>
      </Card>
      <Card style={{marginBottom:"1rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:14,fontWeight:700,color:"#1E293B",display:"flex",alignItems:"center",gap:4}}><Tooltip text={TOOLTIPS.jobType}>作業種別・料金表</Tooltip></div>
          <button onClick={()=>setLocal(s=>({...s,jobTypes:[...s.jobTypes,{id:Date.now(),name:"新しい種別",hours:2,defaultPrice:5000}]}))} style={{fontSize:12,padding:"4px 10px"}}>+ 追加</button>
        </div>
        <div style={{fontSize:12,color:"#64748B",marginBottom:8}}>種別名 / 工数(h) / 標準価格 / 時給換算</div>
        {local.jobTypes.map(t=>{const rate=t.hours>0?Math.round(t.defaultPrice/t.hours):0;return(
          <div key={t.id} style={{display:"grid",gridTemplateColumns:"1fr 60px 100px 72px 36px",gap:6,alignItems:"center",marginBottom:6}}>
            <input value={t.name} onChange={e=>upJT(t.id,"name",e.target.value)} style={{boxSizing:"border-box"}}/>
            <input type="number" value={t.hours} onChange={e=>upJT(t.id,"hours",e.target.value)} style={{boxSizing:"border-box"}} step="0.5"/>
            <input type="number" value={t.defaultPrice} onChange={e=>upJT(t.id,"defaultPrice",e.target.value)} style={{boxSizing:"border-box"}}/>
            <div style={{fontSize:12,color:rate<local.alertHourlyRate?"#C2410C":"#15803D",fontWeight:700,textAlign:"center"}}>{yen(rate)}/h</div>
            <button onClick={()=>setConfirmDel({type:"jobType",id:t.id})} style={{padding:"4px",color:"#fff",background:"#EF4444",border:"1px solid #EF4444",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:13}}><i className="ti ti-trash"/></button>
          </div>
        );})}
      </Card>
      <Card style={{marginBottom:"1rem"}}>
        <div style={{fontSize:14,fontWeight:700,color:"#1E293B",marginBottom:10}}>クライアント管理</div>
        {clients.map(c=>(
          <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:"var(--clr-bg)",borderRadius:8,marginBottom:6,border:"1px solid #E2E8F0"}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:c.color,flexShrink:0}}/>
            <span style={{flex:1,fontSize:13,fontWeight:600,color:"#1E293B"}}>{c.name}{c.paymentDelay&&<span style={{marginLeft:6,fontSize:11,color:"#C2410C",background:"#FFF7ED",padding:"1px 6px",borderRadius:10}}>⚠ 遅延歴</span>}</span>
            <span style={{fontSize:12,color:"#64748B"}}>{c.paymentMethod}</span>
            <button onClick={()=>setEditCl({...c})} style={{fontSize:12,padding:"3px 8px",borderRadius:6}}><i className="ti ti-edit"/></button>
            <button onClick={()=>setConfirmDel({type:"client",id:c.id})} style={{padding:"3px 7px",fontSize:13,color:"#fff",background:"#EF4444",border:"1px solid #EF4444",borderRadius:6,cursor:"pointer"}}><i className="ti ti-trash"/></button>
          </div>
        ))}
      </Card>
      <Card>
        <div style={{fontSize:14,fontWeight:700,color:"#1E293B",marginBottom:10}}>データ管理</div>
        <div style={{fontSize:12,color:"#64748B",marginBottom:8}}>※ データはSupabaseクラウドに自動保存されています。PCとスマホで同じデータを共有できます。</div>
        <button onClick={()=>{const b=new Blob([JSON.stringify({settings,clients},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="freelancekit-backup.json";a.click();}} style={{fontSize:13}}><i className="ti ti-download"/> バックアップ (JSON)</button>
      </Card>
      {confirmDel&&<Confirm message={confirmDel.type==="jobType"?"この種別を削除しますか？":"このクライアントを削除しますか？"} onConfirm={()=>{if(confirmDel.type==="jobType")rmJT(confirmDel.id);else{setClients(p=>p.filter(c=>c.id!==confirmDel.id));setConfirmDel(null);}}} onCancel={()=>setConfirmDel(null)}/>}
      {editCl&&<Modal title="クライアント編集" onClose={()=>setEditCl(null)}>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><Lbl>クライアント名</Lbl><input value={editCl.name} onChange={e=>setEditCl(c=>({...c,name:e.target.value}))} style={{width:"100%",boxSizing:"border-box"}}/></div>
          <div><Lbl>支払い方法</Lbl><select value={editCl.paymentMethod} onChange={e=>setEditCl(c=>({...c,paymentMethod:e.target.value}))} style={{width:"100%"}}>{PAYMENT_METHODS.map(m=><option key={m}>{m}</option>)}</select></div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input type="checkbox" id="delay" checked={editCl.paymentDelay} onChange={e=>setEditCl(c=>({...c,paymentDelay:e.target.checked}))} style={{accentColor:"#EF4444",width:15,height:15}}/>
            <label htmlFor="delay" style={{fontSize:13,color:"#1E293B",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><Tooltip text={TOOLTIPS.paymentDelay}>入金遅延歴あり（前払い推奨）</Tooltip></label>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{CLIENT_PALETTE.map(col=><button key={col} onClick={()=>setEditCl(c=>({...c,color:col}))} style={{width:28,height:28,borderRadius:"50%",background:col,border:editCl.color===col?"3px solid #1E293B":`3px solid ${col}`,cursor:"pointer",padding:0}}/>)}</div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setEditCl(null)}>キャンセル</button>
            <button onClick={()=>{setClients(p=>p.map(c=>c.id===editCl.id?editCl:c));setEditCl(null);}} style={{background:"var(--clr-primary)",color:"#fff",border:"none",borderRadius:8,padding:"6px 18px",fontWeight:700,cursor:"pointer"}}>保存</button>
          </div>
        </div>
      </Modal>}
    </div>
  );
}

// ── ROOT APP ───────────────────────────────────────────────
function App(){
  const USER_ID=uid();
  const[activeTab,setActiveTab]=useState("home");
  const[jobs,setJobsRaw]=useState([]);
  const[clients,setClientsRaw]=useState([]);
  const[expenses,setExpensesRaw]=useState([]);
  const[settings,setSettingsRaw]=useState(INIT_SETTINGS);
  const[loading,setLoading]=useState(true);
  const[syncing,setSyncing]=useState(false);
  const[lastSync,setLastSync]=useState(null);
  const[menuOpen,setMenuOpen]=useState(false);
  const syncTimer=useRef(null);

  // load from Supabase on mount
  useEffect(()=>{
    async function load(){
      setLoading(true);
      try{
        const[j,c,e,s]=await Promise.all([
          dbLoad("jobs",USER_ID),dbLoad("clients",USER_ID),
          dbLoad("expenses",USER_ID),dbLoad("settings",USER_ID)
        ]);
        if(j)setJobsRaw(j);
        if(c)setClientsRaw(c);else setClientsRaw([]);
        if(e)setExpensesRaw(e);else setExpensesRaw([]);
        if(s)setSettingsRaw(s);
      }catch(err){console.error("Load error:",err);}
      setLoading(false);
    }
    load();
  },[]);

  // debounced auto-save
  function scheduleSave(table,data){
    setSyncing(true);
    if(syncTimer.current)clearTimeout(syncTimer.current);
    syncTimer.current=setTimeout(async()=>{
      try{
        await dbSave(table,USER_ID,data);
        setLastSync(new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})+"保存");
      }catch(err){console.error("Save error:",err);}
      setSyncing(false);
    },1200);
  }

  function setJobs(v){const next=typeof v==="function"?v(jobs):v;setJobsRaw(next);scheduleSave("jobs",next);}
  function setClients(v){const next=typeof v==="function"?v(clients):v;setClientsRaw(next);scheduleSave("clients",next);}
  function setExpenses(v){const next=typeof v==="function"?v(expenses):v;setExpensesRaw(next);scheduleSave("expenses",next);}
  function setSettings(v){const next=typeof v==="function"?v(settings):v;setSettingsRaw(next);scheduleSave("settings",next);}

  const theme=PASTEL_THEMES.find(t=>t.id===settings.themeId)||PASTEL_THEMES[0];
  useEffect(()=>{
    const r=document.documentElement;
    r.style.setProperty("--clr-primary",theme.primary);
    r.style.setProperty("--clr-accent",theme.accent);
    r.style.setProperty("--clr-bg",theme.bg);
    r.style.setProperty("--clr-card",theme.card);
    document.body.style.background=theme.bg;
    document.body.style.fontSize=settings.fontSize+"px";
  },[theme,settings.fontSize]);

  if(loading)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16,background:theme.bg}}>
      <div style={{width:44,height:44,borderRadius:12,background:theme.primary,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <i className="ti ti-briefcase" style={{color:"#fff",fontSize:24}}/>
      </div>
      <div style={{fontSize:18,fontWeight:700,color:theme.primary}}>FreelanceKit</div>
      <div style={{fontSize:13,color:"#94A3B8"}}>データを読み込んでいます...</div>
    </div>
  );

  const tabContent={
    home:<HomeTab jobs={jobs} clients={clients} settings={settings} expenses={expenses}/>,
    jobs:<JobsTab jobs={jobs} setJobs={setJobs} clients={clients} setClients={setClients} settings={settings}/>,
    calendar:<CalendarTab jobs={jobs} clients={clients} settings={settings}/>,
    finance:<FinanceTab jobs={jobs} expenses={expenses} setExpenses={setExpenses} settings={settings} setSettings={setSettings}/>,
    analysis:<AnalysisTab jobs={jobs} clients={clients} settings={settings}/>,
    invoice:<InvoiceTab jobs={jobs} clients={clients} settings={settings}/>,
    contract:<ContractTab jobs={jobs} clients={clients} settings={settings}/>,
    settings:<SettingsTab settings={settings} setSettings={setSettings} clients={clients} setClients={setClients}/>,
  };

  return(
    <div style={{maxWidth:820,margin:"0 auto",padding:"0.75rem",minHeight:"100vh"}}>
      <h1 className="sr-only">FreelanceKit</h1>
      {/* header */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"0.75rem",padding:"0.75rem 1rem",background:theme.card,borderRadius:12,border:"1.5px solid #E2E8F0",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style={{width:32,height:32,borderRadius:8,background:theme.primary,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <i className="ti ti-briefcase" style={{color:"#fff",fontSize:18}}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:16,fontWeight:900,color:theme.primary,letterSpacing:-0.5}}>FreelanceKit</div>
          <div style={{fontSize:11,color:"#94A3B8"}}>フリーランサー管理ツール</div>
        </div>
        <SyncBadge syncing={syncing} lastSync={lastSync}/>
      </div>
      {/* desktop tabs */}
      <div style={{display:"flex",gap:2,overflowX:"auto",marginBottom:"1rem",background:theme.card,borderRadius:12,border:"1.5px solid #E2E8F0",padding:"4px"}}>
        {TABS.map(tab=>{const active=activeTab===tab.id;return(
          <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{padding:"7px 10px",fontSize:12,border:"none",borderRadius:8,background:active?theme.primary:"transparent",color:active?"#fff":"#64748B",fontWeight:active?700:400,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4,flex:"0 0 auto"}}>
            <i className={`ti ${tab.icon}`} style={{fontSize:14}}/>{tab.label}
          </button>
        );})}
      </div>
      {/* content */}
      <div style={{paddingBottom:80}}>{tabContent[activeTab]}</div>
      {/* mobile bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:theme.card,borderTop:"1.5px solid #E2E8F0",zIndex:100,padding:"4px 0",display:"none"}} id="mobile-nav">
        <div style={{display:"flex",justifyContent:"space-around",maxWidth:820,margin:"0 auto"}}>
          {TABS.slice(0,5).map(tab=>{const active=activeTab===tab.id;return(
            <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 4px",border:"none",background:"transparent",color:active?theme.primary:"#94A3B8",cursor:"pointer",fontSize:10,fontWeight:active?700:400,minWidth:52}}>
              <i className={`ti ${tab.icon}`} style={{fontSize:20}}/><span>{tab.label}</span>
            </button>
          );})}
          <button onClick={()=>setMenuOpen(m=>!m)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 4px",border:"none",background:"transparent",color:["invoice","contract","settings"].includes(activeTab)?theme.primary:"#94A3B8",cursor:"pointer",fontSize:10,minWidth:52}}>
            <i className="ti ti-dots" style={{fontSize:20}}/><span>その他</span>
          </button>
        </div>
      </div>
      {menuOpen&&<div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.4)"}} onClick={()=>setMenuOpen(false)}>
        <div style={{position:"absolute",bottom:70,left:16,right:16,background:theme.card,borderRadius:16,border:"1.5px solid #E2E8F0",padding:"8px",boxShadow:"0 -8px 32px rgba(0,0,0,0.15)",maxWidth:820,margin:"0 auto"}} onClick={e=>e.stopPropagation()}>
          {TABS.slice(5).map(tab=>{const active=activeTab===tab.id;return(
            <button key={tab.id} onClick={()=>{setActiveTab(tab.id);setMenuOpen(false);}} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",border:"none",borderRadius:10,background:active?theme.primary+"22":"transparent",color:active?theme.primary:"#334155",cursor:"pointer",width:"100%",fontSize:14,fontWeight:active?700:400}}>
              <i className={`ti ${tab.icon}`} style={{fontSize:20}}/>{tab.label}
            </button>
          );})}
        </div>
      </div>}
      <style>{`
        @media(max-width:600px){
          #mobile-nav{display:block!important}
          .hide-mobile{display:none!important}
        }
      `}</style>
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
